<div class="card">
  <div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:16px">
    <h2>👥 Pacientes</h2>
    <button class="btn btn-primary" (click)="nuevo()">+ Nuevo</button>
  </div>

  <div *ngIf="mostrarForm" class="card" style="background:#f9f9f9">
    <h3>{{ editando ? 'Editar' : 'Nuevo' }} Paciente</h3>

    <div style="display:grid;grid-template-columns:1fr 1fr;gap:12px;margin-top:16px">
      <div class="form-group">
        <label>Documento</label>
        <input [(ngModel)]="form.num_doc_p" />
      </div>

      <div class="form-group">
        <label>Tipo doc</label>
        <select [(ngModel)]="form.ID_tipo_doc">
          <option [value]="1">CC</option>
          <option [value]="2">TI</option>
          <option [value]="3">CE</option>
        </select>
      </div>

      <div class="form-group">
        <label>Nombre</label>
        <input [(ngModel)]="form.nom_p" />
      </div>

      <div class="form-group">
        <label>Apellido</label>
        <input [(ngModel)]="form.ape_p" />
      </div>

      <div class="form-group">
        <label>Fecha nacimiento</label>
        <input [(ngModel)]="form.fecha_nac_p" type="date" />
      </div>

      <div class="form-group">
        <label>Genero</label>
        <select [(ngModel)]="form.ID_genero">
          <option [value]="1">Femenino</option>
          <option [value]="2">Masculino</option>
          <option [value]="3">Prefiere no decirlo</option>
        </select>
      </div>

      <div class="form-group">
        <label>Telefono</label>
        <input [(ngModel)]="form.telefono_p" />
      </div>

      <div class="form-group">
        <label>Correo</label>
        <input [(ngModel)]="form.correo_p" type="email" />
      </div>

      <div class="form-group">
        <label>Direccion</label>
        <input [(ngModel)]="form.direc_p" />
      </div>

      <div class="form-group">
        <label>ID EPS</label>
        <input [(ngModel)]="form.ID_eps" type="number" />
      </div>
    </div>

    <div style="margin-top:16px;display:flex;gap:8px">
      <button class="btn btn-success" (click)="guardar()">Guardar</button>
      <button class="btn btn-secondary" (click)="mostrarForm=false">Cancelar</button>
    </div>
  </div>

  <div *ngIf="loading">Cargando...</div>

  <table *ngIf="!loading">
    <thead>
      <tr>
        <th>ID</th>
        <th>Documento</th>
        <th>Nombre</th>
        <th>Apellido</th>
        <th>Telefono</th>
        <th>Acciones</th>
      </tr>
    </thead>

    <tbody>
      <tr *ngFor="let p of pacientes">
        <td>{{ p.ID_Paciente }}</td>
        <td>{{ p.num_doc_p }}</td>
        <td>{{ p.nom_p }}</td>
        <td>{{ p.ape_p }}</td>
        <td>{{ p.telefono_p }}</td>

        <td>
          <button
            class="btn btn-warning btn-sm"
            (click)="editar(p)"
            *ngIf="auth.canEdit()">
            Editar
          </button>

          <button
            class="btn btn-danger btn-sm"
            (click)="eliminar(p.ID_Paciente)"
            style="margin-left:6px"
            *ngIf="auth.isAdmin()">
            Eliminar
          </button>
        </td>
      </tr>
    </tbody>
  </table>
</div>
