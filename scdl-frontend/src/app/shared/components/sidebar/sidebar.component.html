<aside class="sidebar">

    <a routerLink="/dashboard" routerLinkActive="active" [routerLinkActiveOptions]="{exact:true}">🏠 Inicio</a>

    <!-- Usuario y superiores -->
    <a routerLink="/dashboard/pacientes" routerLinkActive="active" *ngIf="auth.canView()">👥 Pacientes</a>

    <!-- Administrador y superiores -->

    <a routerLink="/dashboard/eps"       routerLinkActive="active" *ngIf="auth.isAdmin()">🏢 EPS</a>

    <!-- Solo Superadmin -->
    <a routerLink="/dashboard/usuarios"  routerLinkActive="active" *ngIf="auth.isSuperadmin()">👤 Usuarios</a>
    <a routerLink="/dashboard/auditoria" routerLinkActive="active" *ngIf="auth.isSuperadmin()">📋 Auditoría</a>
  </nav>
